<!-- FILTERS -->

<div class="filter-container">


  <!-- SEARCH -->

  <app-global-search

    [enableSearch]="true"

    placeholder="Search Transactions"

    (onSearch)="
      searchGlobal($event)
    ">

  </app-global-search>



  <!-- FILTERS -->

  <app-global-search

    [enableSearch]="false"

    [enableStatusFilter]="true"

    [enableCurrencyFilter]="true"

    [enablePaymentModeFilter]="true"

    [status]="statuses"

    [currencies]="currencies"

    [paymentModes]="paymentModes"

    (filtersChanged)="
      onFiltersChange($event)
    ">

  </app-global-search>

 

  <!-- BUTTON -->

  <button
    mat-raised-button
    color="primary"
    (click)="applyDateFilter()">

    Search

  </button>

</div>



<!-- TABLE -->

<table
  mat-table
  [dataSource]="tableData"
  class="mat-elevation-z2 transaction-table">


  <!-- TXN -->

  <ng-container matColumnDef="txnRefNo">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Txn Ref No

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.txnRefNo }}

    </td>

  </ng-container>



  <!-- CUSTOMER -->

  <ng-container matColumnDef="customerName">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Customer Name

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.customerName }}

    </td>

  </ng-container>



  <!-- BENEFICIARY -->

  <ng-container matColumnDef="beneficiaryName">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Beneficiary

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.beneficiaryName }}

    </td>

  </ng-container>



  <!-- AMOUNT -->

  <ng-container matColumnDef="amount">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Amount

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.amount }}

    </td>

  </ng-container>



  <!-- CURRENCY -->

  <ng-container matColumnDef="currency">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Currency

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.currency }}

    </td>

  </ng-container>



  <!-- PAYMENT -->

  <ng-container matColumnDef="paymentMode">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Payment Mode

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{ row.paymentMode }}

    </td>

  </ng-container>



  <!-- STATUS -->

  <ng-container matColumnDef="status">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Status

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      <span>

        {{ row.status }}

      </span>

    </td>

  </ng-container>



  <!-- DATE -->

  <ng-container matColumnDef="createdDate">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Created Date

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      {{
        row.createdDate
        | date:'dd/MM/yyyy hh:mm a'
      }}

    </td>

  </ng-container>



  <!-- ACTION -->

  <ng-container matColumnDef="action">

    <th
      mat-header-cell
      *matHeaderCellDef>

      Action

    </th>

    <td
      mat-cell
      *matCellDef="let row">

      <button
        mat-raised-button
        color="primary"
        [disabled]="
          !row.isDownloadAllowed
        ">

        Download

      </button>

    </td>

  </ng-container>



  <!-- HEADER -->

  <tr
    mat-header-row
    *matHeaderRowDef="
      displayedColumns
    ">
  </tr>



  <!-- ROW -->

  <tr
    mat-row
    *matRowDef="
      let row;
      columns: displayedColumns
    ">
  </tr>

</table>



<!-- PAGINATOR -->

<mat-paginator

  [length]="
    totalRecords()
  "

  [pageSize]="
    pageSize()
  "

  [pageIndex]="
    pageIndex()
  "

  [pageSizeOptions]="
    [10,20,50,100]
  "

  (page)="
    onPageChange($event)
  ">

</mat-paginator>
