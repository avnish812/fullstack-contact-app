<mat-card class=" mb-3">
    <div class="contacts-container ">
        <mat-card-header>
            <mat-card-title>Contacts List from your XlSX File</mat-card-title>
        </mat-card-header>
        <div class="d-flex buttons">
            <div class="w-100">
                <button mat-raised-button class="add-btn btn" (click)="addContacts()">Add Contacts</button>
            </div>
            <div class="d-flex w-100 mb-2 justify-content-around">
                <button mat-raised-button *ngIf="showText" class="add-btn btn" [routerLink]="['/upload']">Upload Your
                    XLSX
                    FIlE</button>
                <button mat-raised-button class="add-btn btn" (click)="exportSelected()">Export
                    <img src="../../../assets/img/export.png" alt="" style="width: 20px;">
                </button>
                <button mat-raised-button class="add-btn btn" (click)="deleteSelected()">Delete</button>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <mat-form-field>
                <mat-label>Search Contacts....</mat-label>
                <input matInput [(ngModel)]="search" (keyup)="onSearchChange(search)" placeholder="Search contacts" />
            </mat-form-field>
            <div class="d-flex justify-content-around gap-3">
                <mat-form-field>
                    <mat-label>filter by name.....</mat-label>
                    <input matInput (input)="onFilterChange('name',$event)" placeholder="Filter by Name">
                </mat-form-field>
                <mat-form-field>
                    <mat-label>filter by email.....</mat-label>
                    <input matInput (input)="onFilterChange('email',$event)" placeholder="Filter by Email">
                </mat-form-field>
                <mat-form-field>
                    <mat-label>filter by phone......</mat-label>
                    <input matInput (input)="onFilterChange('phone',$event)" placeholder="Filter by Phone">
                </mat-form-field>
            </div>
        </div>
        <table mat-table [dataSource]="dataSource" matSort>

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Serial No.</th>
                <td mat-cell *matCellDef="let element; let i= index">{{ i+1 }}</td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let element">{{ element.name }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                <td mat-cell *matCellDef="let element">{{ element.email }}</td>
            </ng-container>

            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone</th>
                <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
            </ng-container>

            <ng-container matColumnDef="address">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Address</th>
                <td mat-cell *matCellDef="let element">{{ element.address }}</td>
            </ng-container>

            <ng-container matColumnDef="select">
                <th mat-header-cell *matHeaderCellDef>
                    <mat-checkbox (change)="toggleSelection()"
                        [checked]="selectedContacts.length === dataSource.data.length"
                        [indeterminate]="selectedContacts.length > 0 && selectedContacts.length < dataSource.data.length"></mat-checkbox>
                </th>
                <td mat-cell *matCellDef="let row">
                    <mat-checkbox [(ngModel)]="row.select" (change)="onRowSelectionChange(row)"></mat-checkbox>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let contact">
                    <button mat-icon-button (click)="viewContact(contact)">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <button mat-icon-button (click)="editContact(contact)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button (click)="deleteContact(contact)">
                        <mat-icon>delete</mat-icon>
                    </button>
                    <button mat-icon-button (click)="exportContact(contact)">
                        <img src="../../../assets/img/export.png" alt="">
                    </button>
                    <button mat-icon-button (click)="grandchild()">
                        <span>grandchild</span>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [length]="totalContacts" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
            (page)="onPageChange($event)">
        </mat-paginator>
    </div>
</mat-card>
